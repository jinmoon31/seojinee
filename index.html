<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 조용한 기록들</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 아날로그/타자기 감성을 위한 Monospace 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&family=Noto+Sans+KR:wght@300;400&display=swap');
        
        body { 
            /* 따뜻한 종이 질감 색상 */
            background-color: #fdfcfb; 
            color: #1a1a1a;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .mono { font-family: 'Courier Prime', monospace; }
        
        /* 일기장 줄글 느낌의 언더라인 */
        .diary-entry {
            border-bottom: 1px dotted #e0e0e0;
            padding-bottom: 2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="antialiased">

    <header class="max-w-2xl mx-auto px-6 py-16 text-center">
        <h1 class="mono text-2xl font-bold tracking-tight text-slate-900">
            _my personal log
        </h1>
        <p class="text-xs text-slate-400 mt-2 mono">last updated: 2026.03.15</p>
    </header>

    <main class="max-w-2xl mx-auto px-6 pb-24">
        
        <article class="diary-entry">
            <div class="flex items-center gap-4 mb-4">
                <span class="mono text-sm text-blue-600 bg-blue-50 px-3 py-1 rounded-full">260315</span>
                <h2 class="text-lg font-medium">프로필 만들기</h2>
            </div>
            <p class="text-slate-600 leading-relaxed font-light text-sm">
                AI한테 홈페이지 만들어달라고 했더니 너무 거창하게 짜줘서 오그라들었다. 
                그냥 내 생각이나 가끔 적는 조용한 공간이면 족한데. 
                결국 다 덜어내고 이렇게 줄글만 남겼다. 이 편이 훨씬 마음이 편하다.
            </p>
        </article>

        <article class="diary-entry">
            <div class="flex items-center gap-4 mb-4">
                <span class="mono text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full">260312</span>
                <h2 class="text-lg font-medium">연구와 노이즈</h2>
            </div>
            <p class="text-slate-600 leading-relaxed font-light text-sm">
                오늘 트레바리 모임에서 의료 AI 노이즈 이야기를 했다. 
            
            </p>
        </article>

        <article class="diary-entry border-none">
            <div class="flex items-center gap-4 mb-4">
                <span class="mono text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full">260310</span>
                <h2 class="text-lg font-medium">취미생활</h2>
            </div>
            <p class="text-slate-600 leading-relaxed font-light text-sm">
                간만에 골프나가는데 내일 잘했으면 좋겠다
                그래도 날씨가 좋아서 다행이었다.
            </p>
        </article>

    </main>

    <footer class="text-center pb-16 text-xs text-slate-300 mono">
        .. end of log ..
    </footer>

</body>
</html>
